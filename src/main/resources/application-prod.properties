# ===== PRODUCTION =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refreshExpiration=604800000

server.servlet.context-path=/api

uploads.dir=uploads
uploads.base-url=${UPLOADS_BASE_URL:https://faithful-kamillah-woyo-62a37bc3.koyeb.app/api/files}

# Google Maps key used for reverse geocoding recipient coordinates.
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}

# Google Sign-In OAuth.
# GOOGLE_CLIENT_ID should match the web client ID used by the Flutter app
# (GOOGLE_WEB_CLIENT_ID). The fallback keeps production usable if the env var
# is not set, but overriding it in Koyeb remains recommended.
google.client-id=${GOOGLE_CLIENT_ID:987981475418-ij8o39m6cs9fl59gt2ff1itmld9thho9.apps.googleusercontent.com}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.phone.default-country-code=+223
app.otp.expiration-minutes=5
